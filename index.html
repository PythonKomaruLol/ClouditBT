<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudit Mesh | Remote & Messenger v2.0</title>
    <style>
        :root {
            --bg: #030712;
            --accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #1e1b4b 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 500px; margin: 0 auto; height: 100vh;
            display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            backdrop-filter: blur(50px); position: relative;
        }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; padding: 25px; animation: fadeIn 0.4s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* ВХОД */
        .auth-content { text-align: center; margin-top: 60px; }
        .logo { 
            width: 80px; height: 80px; background: var(--accent); border-radius: 20px; 
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 900; color: #000; box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }

        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border);
            background: var(--glass); color: white; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--accent); color: #000; font-weight: 800; cursor: pointer;
        }

        /* ЧАТ И ПУЛЬТ */
        .header { 
            padding: 15px 20px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.3);
        }
        .status-badge { font-size: 10px; padding: 5px 12px; border-radius: 20px; background: rgba(255,255,255,0.1); }
        .online { color: #00ff88; border: 1px solid #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 2px; }

        /* ПУЛЬТ */
        .remote-panel {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            padding: 15px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border);
        }
        .r-btn {
            aspect-ratio: 1; border-radius: 50%; border: 1px solid var(--border);
            background: #111827; color: #4facfe; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.1s;
        }
        .r-btn:active { background: #4facfe; color: black; transform: scale(0.9); }
        .r-power { color: var(--red); border-color: var(--red); }

        /* ТЕРМИНАЛ */
        #console {
            height: 80px; background: #000; font-family: monospace; font-size: 10px;
            color: #00ff00; padding: 10px; overflow-y: auto; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="container">
    
    <div id="screen-auth" class="screen active">
        <div class="auth-content">
            <div class="logo">C</div>
            <h1>Cloudit Mesh</h1>
            <p style="opacity: 0.6;">Bluetooth Protocol v2.0</p>
            <input type="text" id="nick" placeholder="Введи свой ник (напр. admin)">
            <button class="btn" onclick="login()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <div id="screen-main" class="screen" style="padding:0;">
        <div class="header">
            <div>
                <b id="display-nick">User</b><br>
                <span style="font-size: 9px; opacity: 0.5;">Local Node: Online</span>
            </div>
            <div id="bt-status" class="status-badge">BT: ВЫКЛ</div>
            <button onclick="scanBT()" style="background:none; border:1px solid #4facfe; color:#4facfe; padding:5px 10px; border-radius:8px; cursor:pointer;">ПОИСК</button>
        </div>

        <div id="messages">
            <div class="msg them">Добро пожаловать в Cloudit! Найди устройство рядом, чтобы начать перехват или общение.</div>
        </div>

        <div id="remote" class="remote-panel" style="display:none;">
            <button class="r-btn" onclick="tvCmd('BACK')">⬅️</button>
            <button class="r-btn" onclick="tvCmd('UP')">🔼</button>
            <button class="r-btn r-power" onclick="tvCmd('POWER')">OFF</button>
            <button class="r-btn" onclick="tvCmd('LEFT')">◀️</button>
            <button class="r-btn" onclick="tvCmd('OK')" style="background:#4facfe; color:black;">OK</button>
            <button class="r-btn" onclick="tvCmd('RIGHT')">▶️</button>
            <button class="r-btn" onclick="tvCmd('VOL_DOWN')">🔉</button>
            <button class="r-btn" onclick="tvCmd('DOWN')">🔽</button>
            <button class="r-btn" onclick="tvCmd('VOL_UP')">🔊</button>
            <button class="btn" onclick="tvCmd('MUTE')" style="grid-column: span 3; padding: 10px; margin-top: 5px;">MUTE (БЕЗ ЗВУКА) 🤫</button>
        </div>

        <div id="console">> Инициализация терминала... ok</div>

        <div style="padding:15px; background: #030712; display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0; flex:1;">
            <button class="btn" onclick="sendMsg()" style="width: 60px; padding:0;">📡</button>
        </div>
    </div>
</div>

<script>
    let myUser = "";
    let device = null;
    let gatt = null;

    function login() {
        const n = document.getElementById('nick').value;
        if(n.length < 2) return alert("Ник слишком короткий!");
        myUser = n;
        document.getElementById('display-nick').innerText = "@" + n;
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'flex';
        log(`User ${myUser} joined. Stack ready.`);
    }

    async function scanBT() {
        log("Запуск глубокого сканирования...");
        try {
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['00001800-0000-1000-8000-00805f9b34fb', 'human_interface_device']
            });

            log(`Найдено: ${device.name || 'Unnamed'}`);
            gatt = await device.gatt.connect();
            log("GATT Connected! Узел захвачен.");

            document.getElementById('bt-status').innerText = "LINK: " + (device.name || "ACTIVE");
            document.getElementById('bt-status').classList.add('online');
            
            // Показываем пульт, если это ТВ или комп
            document.getElementById('remote').style.display = 'grid';
            addMsg("System", `Успешно подключено к ${device.name}. Пульт Cloudit Remote активирован!`);

        } catch (e) {
            log("Error: " + e.message);
            alert("Включи Bluetooth/GPS и убедись, что есть разрешения!");
        }
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        const txt = inp.value.trim();
        if(!txt) return;

        addMsg(myUser, txt, true);
        log(`TX [DATA]: ${txt.length} bytes encrypted.`);
        
        // Симуляция ответа от сети
        setTimeout(() => {
            if(device) {
                const hex = "RX " + Math.floor(Math.random()*0xFFFFFF).toString(16).toUpperCase();
                log(hex + ": Packet verified.");
                addMsg(device.name || "Remote Node", "Пакет данных получен. RSSI: -64dBm");
            }
        }, 1500);

        inp.value = "";
    }

    async function tvCmd(cmd) {
        log(`CMD_SEND: ${cmd}`);
        // Имитация хакерской активности в консоли
        log(`Attempting write to GATT characteristic...`);
        
        try {
            // Пытаемся найти HID сервис (для управления)
            const service = await gatt.getPrimaryService('human_interface_device');
            log("HID Service found! Sending report...");
            // В реальном сценарии здесь идет запись байтов
        } catch(e) {
            log("Protection: Device requires PIN or HID Profile.");
            // Даже если не сработает физически без сопряжения, сосед может увидеть уведомление!
        }
    }

    function addMsg(user, text, isMe = false) {
        const box = document.getElementById('messages');
        const d = document.createElement('div');
        d.className = `msg ${isMe ? 'me' : 'them'}`;
        d.innerHTML = `<div style="font-size:9px; font-weight:800; opacity:0.6">${user}</div>${text}`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function log(m) {
        const c = document.getElementById('console');
        c.innerHTML += `<br>> ${m}`;
        c.scrollTop = c.scrollHeight;
    }

    // Энтер для отправки
    document.getElementById('msg-input').addEventListener("keyup", (e) => {
        if(e.keyCode === 13) sendMsg();
    });
</script>

</body>
</html>
